# ──────────────────────────────────────────────────────────────────────
# Release workflow — build cross-platform binaries, publish GitHub
# Release, and upload artifacts + manifest to S3.
#
# SUPPLY CHAIN SECURITY:
#   • All third-party Actions are pinned to full commit SHAs to prevent
#     tag-repointing attacks (see: tj-actions/changed-files incident).
#     The "# vN" comment after each SHA records the human-readable tag
#     at the time of pinning — Dependabot uses it to propose updates.
#   • Job-level `permissions` follow least-privilege: each job declares
#     only the scopes it actually needs.
#   • OIDC (`id-token: write`) is used for AWS instead of long-lived keys.
#
# RUNNERS:
#   • Linux/Windows/macOS builds use Blacksmith runners for faster execution
#     + colocated cache (https://docs.blacksmith.sh).
#   • Blacksmith macOS runners are Apple Silicon (ARM64). Darwin AMD64 is
#     cross-compiled on the same macOS image via the explicit target install
#     below, preserving the existing proov-darwin-amd64.tar.gz artifact.
#   • Swatinem/rust-cache works on all runners — Blacksmith transparently
#     intercepts cache calls on its runners for 4× faster downloads.
#     (useblacksmith/rust-cache is archived and no longer maintained.)
# ──────────────────────────────────────────────────────────────────────

name: Release

on:
    push:
        tags:
            - "v*"
    # Allow manual re-runs in case a release needs to be re-published
    workflow_dispatch:

# Top-level permissions — jobs override with least-privilege below
permissions:
    id-token: write
    contents: write

env:
    CARGO_TERM_COLOR: always
    BINARY_NAME: proov
    UPDATE_HOST: https://vettd.agentichighway.ai
    UPDATE_SIGNING_KEY_ID: alias/proov-release-signing
    PROOV_UPDATE_PUBLIC_KEY_DER_B64: ${{ vars.PROOV_UPDATE_PUBLIC_KEY_DER_B64 }}

jobs:
    # ── Build ────────────────────────────────────────────────────────
    # Cross-compile for 5 OS/arch targets. Each matrix leg uploads its
    # artifact so downstream jobs can download without rebuilding.
    build:
        strategy:
            matrix:
                include:
                    - target: aarch64-apple-darwin
                      os: blacksmith-6vcpu-macos-15
                      artifact: proov-darwin-arm64.tar.gz
                    - target: x86_64-apple-darwin
                      os: blacksmith-6vcpu-macos-15
                      artifact: proov-darwin-amd64.tar.gz
                    - target: aarch64-unknown-linux-gnu
                      os: blacksmith-4vcpu-ubuntu-2204
                      artifact: proov-linux-arm64.tar.gz
                      cross: true # needs cross-linker
                    - target: x86_64-unknown-linux-gnu
                      os: blacksmith-4vcpu-ubuntu-2204
                      artifact: proov-linux-amd64.tar.gz
                    - target: x86_64-pc-windows-msvc
                      os: blacksmith-4vcpu-windows-2025
                      artifact: proov-windows-amd64.exe
        runs-on: ${{ matrix.os }}
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Validate embedded update verification key
              shell: bash
              run: |
                  set -euo pipefail
                  if [ -z "${PROOV_UPDATE_PUBLIC_KEY_DER_B64:-}" ]; then
                    echo "::error::Missing repo variable PROOV_UPDATE_PUBLIC_KEY_DER_B64. Official releases must embed the KMS public verification key."
                    exit 1
                  fi

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
              with:
                  targets: ${{ matrix.target }}

            # rust-toolchain.toml overrides the action's `targets` input,
            # so we explicitly add the target to ensure cross-compilation
            # works (e.g. x86_64-apple-darwin on ARM64 macOS runners).
            - name: Add build target
              run: rustup target add ${{ matrix.target }}

            # Swatinem/rust-cache works on all runners. Blacksmith
            # transparently redirects cache I/O to its colocated store
            # on Blacksmith runners — no code changes needed.
            - name: Cache Cargo
              uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
              with:
                  key: ${{ matrix.target }}

            - name: Install cross-compilation tools (Linux ARM64)
              if: matrix.cross
              run: |
                  sudo apt-get update
                  sudo apt-get install -y gcc-aarch64-linux-gnu
                  echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

            - name: Build release binary
              run: cargo build --locked --release --target ${{ matrix.target }} -p proov

            - name: Package binary (Unix)
              if: runner.os != 'Windows'
              run: |
                  cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} proov
                  tar -czf ${{ matrix.artifact }} proov

            - name: Package binary (Windows)
              if: runner.os == 'Windows'
              run: cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe ${{ matrix.artifact }}

            - name: Upload build artifact
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: ${{ matrix.artifact }}
                  path: ${{ matrix.artifact }}

    # ── GitHub Release ───────────────────────────────────────────────
    # Collects all build artifacts and creates/updates the GitHub Release.
    release:
        needs: build
        runs-on: blacksmith-2vcpu-ubuntu-2204
        permissions:
            contents: write # create releases + upload assets
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Download all artifacts
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  path: artifacts

            - name: Collect binaries
              run: |
                  mkdir -p release
                  for dir in artifacts/proov-*; do
                    name=$(basename "$dir")
                    cp "$dir/$name" "release/$name"
                  done
                  ls -lh release/

            # Plain SHA-256 checksums for manual download verification.
            # Uploaded as a release asset so users can verify binaries with:
            #   sha256sum --check checksums.txt   (Linux)
            #   shasum -a 256 --check checksums.txt  (macOS)
            # A KMS-signed counterpart (checksums.txt.sig) is added by the
            # upload-s3 job, which shares the same trust chain as `proov update`.
            - name: Generate SHA-256 checksums
              run: |
                  cd release
                  sha256sum proov-* | sort > checksums.txt
                  echo "checksums.txt:"
                  cat checksums.txt

            - name: Create GitHub Release
              uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2
              with:
                  generate_release_notes: true
                  files: release/*

    # ── S3 Upload ────────────────────────────────────────────────────
    # Publishes binaries + a signed latest.json manifest to S3 for the self-updater.
    # Uses OIDC federation — no long-lived AWS keys stored in secrets.
    # Official builds embed the public KMS verification key at compile time and
    # releases publish a detached signature envelope alongside the manifest.
    upload-s3:
        # Depends on `release` so the GitHub Release exists before we try to
        # attach the KMS-signed checksums to it via `gh release upload`.
        needs: [build, release]
        runs-on: blacksmith-2vcpu-ubuntu-2204
        permissions:
            id-token: write # OIDC token for AWS assume-role
            contents: write # upload additional release assets (signed checksums)
        steps:
            - name: Download all artifacts
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  path: artifacts

            - name: Collect binaries
              run: |
                  mkdir -p release
                  for dir in artifacts/proov-*; do
                    name=$(basename "$dir")
                    cp "$dir/$name" "release/$name"
                  done

            # OIDC federation: the runner exchanges a GitHub JWT for
            # short-lived AWS credentials scoped to SCANNER_RELEASE_ROLE_ARN.
            # No long-lived AWS keys are stored in GitHub Secrets.
            - name: Configure AWS credentials (OIDC)
              uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
              with:
                  role-to-assume: ${{ secrets.SCANNER_RELEASE_ROLE_ARN }}
                  aws-region: us-east-1

            - name: Validate signing configuration
              run: |
                  set -euo pipefail
                  if [ -z "${PROOV_UPDATE_PUBLIC_KEY_DER_B64:-}" ]; then
                    echo "::error::Missing repo variable PROOV_UPDATE_PUBLIC_KEY_DER_B64."
                    exit 1
                  fi
                  if [ -z "${UPDATE_SIGNING_KEY_ID:-}" ]; then
                    echo "::error::Missing UPDATE_SIGNING_KEY_ID."
                    exit 1
                  fi

                  KMS_PUBLIC_KEY_DER_B64=$(aws kms get-public-key \
                    --key-id "${UPDATE_SIGNING_KEY_ID}" \
                    --query 'PublicKey' \
                    --output text)

                  if [ "${KMS_PUBLIC_KEY_DER_B64}" != "${PROOV_UPDATE_PUBLIC_KEY_DER_B64}" ]; then
                    echo "::error::PROOV_UPDATE_PUBLIC_KEY_DER_B64 does not match the current KMS public key for ${UPDATE_SIGNING_KEY_ID}."
                    exit 1
                  fi

            - name: Extract tag
              id: tag
              run: echo "TAG=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

            - name: Upload binaries to S3
              run: |
                  TAG="${{ steps.tag.outputs.TAG }}"
                  for file in release/proov-*; do
                    name=$(basename "$file")
                    echo "Uploading $name → s3://ah-scanner-releases/${TAG}/${name}"
                    aws s3 cp "$file" "s3://ah-scanner-releases/${TAG}/${name}"
                  done

            # Per-artifact SHA-256 checksums are embedded in latest.json so
            # `proov update` can verify binary integrity after download.
            - name: Generate SHA-256 checksums
              id: checksums
              run: |
                  for file in release/proov-*; do
                    name=$(basename "$file")
                    hash=$(sha256sum "$file" | awk '{print $1}')
                    echo "SHA256 $name = $hash"
                    key=$(echo "$name" | sed 's/[^a-zA-Z0-9]/_/g')
                    echo "${key}=${hash}" >> "$GITHUB_OUTPUT"
                  done
                  # Write a standard checksums file for signing and S3 upload.
                  # This matches the file generated in the `release` job so
                  # `checksums.txt` and `checksums.txt.sig` cover identical content.
                  (cd release && sha256sum proov-* | sort) > release/checksums.txt

            - name: Write signed latest.json manifest
              run: |
                  set -euo pipefail
                  TAG="${{ steps.tag.outputs.TAG }}"
                  RELEASE_BASE="${UPDATE_HOST}/api/scanner/artifacts/${TAG}"
                  DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
                  DARWIN_ARM64_SIZE=$(wc -c < release/proov-darwin-arm64.tar.gz | tr -d ' ')
                  DARWIN_AMD64_SIZE=$(wc -c < release/proov-darwin-amd64.tar.gz | tr -d ' ')
                  LINUX_ARM64_SIZE=$(wc -c < release/proov-linux-arm64.tar.gz | tr -d ' ')
                  LINUX_AMD64_SIZE=$(wc -c < release/proov-linux-amd64.tar.gz | tr -d ' ')
                  WINDOWS_AMD64_SIZE=$(wc -c < release/proov-windows-amd64.exe | tr -d ' ')

                  cat > /tmp/latest.json <<EOF
                  {
                    "manifestVersion": 1,
                    "version": "${TAG}",
                    "date": "${DATE}",
                    "artifacts": {
                      "darwin-arm64": {
                        "url": "${RELEASE_BASE}/proov-darwin-arm64.tar.gz",
                        "sha256": "${{ steps.checksums.outputs.proov_darwin_arm64_tar_gz }}",
                        "size": ${DARWIN_ARM64_SIZE}
                      },
                      "darwin-amd64": {
                        "url": "${RELEASE_BASE}/proov-darwin-amd64.tar.gz",
                        "sha256": "${{ steps.checksums.outputs.proov_darwin_amd64_tar_gz }}",
                        "size": ${DARWIN_AMD64_SIZE}
                      },
                      "linux-arm64": {
                        "url": "${RELEASE_BASE}/proov-linux-arm64.tar.gz",
                        "sha256": "${{ steps.checksums.outputs.proov_linux_arm64_tar_gz }}",
                        "size": ${LINUX_ARM64_SIZE}
                      },
                      "linux-amd64": {
                        "url": "${RELEASE_BASE}/proov-linux-amd64.tar.gz",
                        "sha256": "${{ steps.checksums.outputs.proov_linux_amd64_tar_gz }}",
                        "size": ${LINUX_AMD64_SIZE}
                      },
                      "windows-amd64": {
                        "url": "${RELEASE_BASE}/proov-windows-amd64.exe",
                        "sha256": "${{ steps.checksums.outputs.proov_windows_amd64_exe }}",
                        "size": ${WINDOWS_AMD64_SIZE}
                      }
                    }
                  }
                  EOF

                  SIGNATURE_B64=$(aws kms sign \
                    --key-id "${UPDATE_SIGNING_KEY_ID}" \
                    --signing-algorithm ECDSA_SHA_256 \
                    --message-type RAW \
                    --message fileb:///tmp/latest.json \
                    --query 'Signature' \
                    --output text)

                  cat > /tmp/latest.signature.json <<EOF
                  {
                    "algorithm": "ECDSA_SHA_256",
                    "keyId": "${UPDATE_SIGNING_KEY_ID}",
                    "signature": "${SIGNATURE_B64}"
                  }
                  EOF

                  aws s3 cp /tmp/latest.json s3://ah-scanner-releases/latest.json \
                      --content-type application/json
                  aws s3 cp /tmp/latest.signature.json s3://ah-scanner-releases/latest.signature.json \
                      --content-type application/json
                  aws s3 cp /tmp/latest.json s3://ah-scanner-releases/manifests/${TAG}/latest.json \
                      --content-type application/json
                  aws s3 cp /tmp/latest.signature.json s3://ah-scanner-releases/manifests/${TAG}/latest.signature.json \
                      --content-type application/json

            # Sign the plain-text checksums file with the same KMS key used for
            # the update manifest. Users can verify manual downloads against the
            # same public key that `proov update` trusts.
            # See docs/release-verification.md for the full verification procedure.
            - name: Sign checksums
              run: |
                  set -euo pipefail
                  SIGNATURE_B64=$(aws kms sign \
                    --key-id "${UPDATE_SIGNING_KEY_ID}" \
                    --signing-algorithm ECDSA_SHA_256 \
                    --message-type RAW \
                    --message fileb://release/checksums.txt \
                    --query 'Signature' \
                    --output text)

                  cat > release/checksums.txt.sig <<EOF
                  {
                    "algorithm": "ECDSA_SHA_256",
                    "keyId": "${UPDATE_SIGNING_KEY_ID}",
                    "signature": "${SIGNATURE_B64}"
                  }
                  EOF

            - name: Upload checksums to S3
              run: |
                  TAG="${{ steps.tag.outputs.TAG }}"
                  aws s3 cp release/checksums.txt \
                      "s3://ah-scanner-releases/${TAG}/checksums.txt" \
                      --content-type text/plain
                  aws s3 cp release/checksums.txt.sig \
                      "s3://ah-scanner-releases/${TAG}/checksums.txt.sig" \
                      --content-type application/json

            # Attach the signed checksums to the GitHub Release so users who
            # download directly from the Releases page find verification material
            # alongside the binaries. --clobber replaces the unsigned checksums.txt
            # uploaded by the `release` job with an identical copy, and adds the
            # new checksums.txt.sig alongside it.
            - name: Upload checksums to GitHub Release
              if: github.ref_type == 'tag'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  GH_REPO: ${{ github.repository }}
              run: |
                  gh release upload "${{ steps.tag.outputs.TAG }}" \
                    release/checksums.txt \
                    release/checksums.txt.sig \
                    --clobber

    # ── Homebrew Tap Refresh ───────────────────────────────────────────
    # Keeps AgenticHighway/homebrew-tap in sync with each tagged release
    # when a cross-repo token is configured. The job is skipped if the
    # token is absent so releases still publish their binaries normally.
    update-homebrew-tap:
        needs: release
        runs-on: blacksmith-2vcpu-ubuntu-2204
        permissions:
            contents: read
        env:
            HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        steps:
            - name: Skip when tap token is not configured
              if: env.HOMEBREW_TAP_TOKEN == ''
              run: echo "HOMEBREW_TAP_TOKEN not configured; skipping Homebrew tap refresh."

            - name: Download all artifacts
              if: env.HOMEBREW_TAP_TOKEN != ''
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  path: artifacts

            - name: Collect binaries
              if: env.HOMEBREW_TAP_TOKEN != ''
              run: |
                  mkdir -p release
                  for dir in artifacts/proov-*; do
                    name=$(basename "$dir")
                    cp "$dir/$name" "release/$name"
                  done

            - name: Extract release metadata
              if: env.HOMEBREW_TAP_TOKEN != ''
              id: release_meta
              run: |
                  echo "TAG=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
                  echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

            - name: Checkout Homebrew tap
              if: env.HOMEBREW_TAP_TOKEN != ''
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  repository: AgenticHighway/homebrew-tap
                  ref: main
                  token: ${{ env.HOMEBREW_TAP_TOKEN }}
                  path: homebrew-tap

            - name: Update Formula/proov.rb
              if: env.HOMEBREW_TAP_TOKEN != ''
              working-directory: homebrew-tap
              env:
                  VERSION: ${{ steps.release_meta.outputs.VERSION }}
              run: |
                  set -euo pipefail
                  export DARWIN_ARM64_SHA=$(sha256sum ../release/proov-darwin-arm64.tar.gz | awk '{print $1}')
                  export DARWIN_AMD64_SHA=$(sha256sum ../release/proov-darwin-amd64.tar.gz | awk '{print $1}')
                  export LINUX_ARM64_SHA=$(sha256sum ../release/proov-linux-arm64.tar.gz | awk '{print $1}')
                  export LINUX_AMD64_SHA=$(sha256sum ../release/proov-linux-amd64.tar.gz | awk '{print $1}')

                  ruby <<'RUBY'
                  path = "Formula/proov.rb"
                  text = File.read(path)

                  replacements = {
                    /version "\d+\.\d+\.\d+"/ => %(version "#{ENV.fetch("VERSION")}"),
                    /(proov-darwin-arm64\.tar\.gz"\n\s+sha256 ")([0-9a-f]+)"/ => "\\1#{ENV.fetch("DARWIN_ARM64_SHA")}\"",
                    /(proov-darwin-amd64\.tar\.gz"\n\s+sha256 ")([0-9a-f]+)"/ => "\\1#{ENV.fetch("DARWIN_AMD64_SHA")}\"",
                    /(proov-linux-arm64\.tar\.gz"\n\s+sha256 ")([0-9a-f]+)"/ => "\\1#{ENV.fetch("LINUX_ARM64_SHA")}\"",
                    /(proov-linux-amd64\.tar\.gz"\n\s+sha256 ")([0-9a-f]+)"/ => "\\1#{ENV.fetch("LINUX_AMD64_SHA")}\""
                  }

                  replacements.each do |pattern, replacement|
                    updated = text.sub(pattern, replacement)
                    raise "failed to update #{pattern.inspect}" if updated == text
                    text = updated
                  end

                  File.write(path, text)
                  RUBY

                  git --no-pager diff -- Formula/proov.rb

            - name: Commit and push formula
              if: env.HOMEBREW_TAP_TOKEN != ''
              working-directory: homebrew-tap
              env:
                  VERSION: ${{ steps.release_meta.outputs.VERSION }}
              run: |
                  set -euo pipefail
                  if git diff --quiet -- Formula/proov.rb; then
                    echo "Formula already up to date."
                    exit 0
                  fi

                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add Formula/proov.rb
                  git commit -m "proov ${VERSION}"
                  git push origin HEAD:main
